<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Mobile Pro - Premium</title>
    <style>
        :root {
            --primary: #059669;
            --primary-light: #34d399;
            --primary-glow: rgba(5, 150, 105, 0.4);
            --bg-dark: #090d16;
            --bg-panel: #0f172a;
            --bg-chat: radial-gradient(circle at top, #131b2e, #070a12);
            --glass: rgba(255, 255, 255, 0.04);
            --glass-active: rgba(255, 255, 255, 0.08);
            --border-glass: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            height: 100vh; 
            height: 100dvh;
            width: 100vw;
            background-color: var(--bg-dark); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            color: var(--text-main);
        }
        
        .chat-container { 
            width: 100%; 
            max-width: 480px; 
            height: 100%; 
            background-color: var(--bg-panel); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6); 
            overflow: hidden; 
        }
        
        /* Cabeçalho Premium */
        .chat-header { 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 16px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            z-index: 10; 
            border-bottom: 1px solid var(--border-glass);
        }

        .avatar { 
            width: 44px; 
            height: 44px; 
            background: linear-gradient(135deg, var(--primary), #10b981); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 20px; 
            box-shadow: 0 0 16px var(--primary-glow);
            font-weight: bold;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-info { flex: 1; }
        .user-info h2 { font-size: 0.95rem; font-weight: 600; letter-spacing: -0.2px; color: var(--text-main); }
        .user-info span { font-size: 0.75rem; color: var(--primary-light); font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .user-info span::before { content: ''; width: 6px; height: 6px; background: var(--primary-light); border-radius: 50%; box-shadow: 0 0 8px var(--primary-light); }

        .btn-header-action { 
            background: var(--glass); 
            border: 1px solid var(--border-glass); 
            color: white; 
            cursor: pointer; 
            font-size: 1.1rem; 
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-header-action:active { transform: scale(0.9); background: var(--glass-active); }

        /* Sistema de Abas Integrado */
        .tab-bar { 
            display: flex; 
            background-color: rgba(15, 23, 42, 0.9); 
            border-bottom: 1px solid var(--border-glass);
            z-index: 10; 
        }

        .tab-btn { 
            flex: 1; 
            padding: 14px; 
            background: none; 
            border: none; 
            color: var(--text-muted); 
            font-weight: 600; 
            font-size: 13px; 
            cursor: pointer; 
            text-align: center; 
            border-bottom: 3px solid transparent; 
            transition: all 0.2s ease; 
        }

        .tab-btn.active { 
            color: var(--primary-light); 
            border-bottom: 3px solid var(--primary-light); 
        }
        
        .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* Login / Perfil View */
        .login-screen { 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: rgba(30, 41, 59, 0.3); 
            border: 1px solid var(--border-glass);
            margin: auto 20px; 
            border-radius: 20px; 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .login-screen h3 { color: var(--text-main); font-size: 1.25rem; letter-spacing: -0.3px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-group input { 
            padding: 14px; 
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-glass); 
            border-radius: 12px; 
            outline: none; 
            font-size: 14px; 
            color: white;
            transition: all 0.2s ease;
        }
        .input-group input:focus { border-color: var(--primary-light); background: rgba(15, 23, 42, 0.8); box-shadow: 0 0 10px rgba(52, 211, 153, 0.1); }
        
        .btn-action { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
            text-align: center; 
            box-shadow: 0 4px 14px var(--primary-glow);
        }
        .btn-action:active { background-color: var(--primary-dark); transform: scale(0.98); }
        .login-status { font-size: 13px; text-align: center; color: var(--primary-light); font-weight: 500; min-height: 18px; }

        /* Área do Chat */
        .chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            background: var(--bg-chat);
            background-size: cover;
            background-position: center;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }

        /* Balões Customizados */
        .message { 
            max-width: 80%; 
            padding: 10px 14px; 
            border-radius: 18px; 
            font-size: 0.92rem; 
            position: relative; 
            word-wrap: break-word; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            animation: bounceIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        @keyframes bounceIn { 
            from { opacity: 0; transform: translateY(16px) scale(0.92); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .message.sent { 
            background: linear-gradient(135deg, var(--primary), #047857); 
            color: white;
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
        }

        .message.received { 
            background: rgba(30, 41, 59, 0.7); 
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f1f5f9;
            align-self: flex-start; 
            border-bottom-left-radius: 4px; 
        }

        .message-sender { font-size: 11px; color: var(--primary-light); font-weight: 700; margin-bottom: 4px; }
        .message-time { font-size: 10px; color: rgba(255, 255, 255, 0.4); text-align: right; margin-top: 5px; align-self: flex-end; }
        .message.sent .message-time { color: rgba(255, 255, 255, 0.65); }

        /* Imagens e Áudios no Balão */
        .message img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 14px;
            margin-top: 4px;
            display: block;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .audio-player-bubble {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 220px;
            padding: 4px 0;
        }

        .audio-play-btn {
            background: white;
            color: var(--primary);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        .audio-play-btn:active { transform: scale(0.9); }

        .audio-waveform {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 3px;
            height: 24px;
        }

        .wave-bar {
            width: 3px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            height: 50%;
            transform-origin: bottom;
            transition: transform 0.15s ease;
        }

        .wave-bar.animating {
            background: #ffffff;
            animation: pulseWave 0.6s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        @keyframes pulseWave { 
            0% { transform: scaleY(0.3); } 
            100% { transform: scaleY(1.1); } 
        }

        /* Barra de Entrada de Texto */
        .chat-input-area { 
            background: rgba(15, 23, 42, 0.92); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 12px 14px; 
            display: flex; 
            align-items: flex-end; 
            gap: 10px; 
            border-top: 1px solid var(--border-glass);
            position: relative;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 4px 14px;
            display: flex;
            align-items: flex-end;
            min-height: 44px;
            max-height: 140px;
            transition: all 0.2s ease;
        }
        .input-wrapper:focus-within {
            border-color: rgba(52, 211, 153, 0.3);
            background: rgba(255, 255, 255, 0.07);
        }

        .chat-input { 
            flex: 1; 
            background: transparent;
            border: none; 
            outline: none; 
            font-size: 0.95rem; 
            color: white;
            resize: none;
            padding: 10px 0;
            line-height: 1.4;
        }
        .chat-input::placeholder { color: var(--text-muted); }

        .btn-send { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 4px 12px var(--primary-glow);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        .btn-send:active { transform: scale(0.9); background-color: #047857; }
        .btn-send svg { width: 18px; height: 18px; fill: white; }

        /* Container de Gravação */
        .recording-container {
            display: none;
            align-items: center;
            gap: 10px;
            flex: 1;
            height: 40px;
            color: #f87171;
            font-size: 0.9rem;
            padding-left: 6px;
            font-weight: 600;
        }

        .record-dot {
            width: 10px;
            height: 10px;
            background: #f87171;
            border-radius: 50%;
            animation: pulseRecord 0.8s infinite alternate;
        }

        @keyframes pulseRecord { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

        /* Teclado de Emojis */
        .emoji-picker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.96);
            border-top: 1px solid var(--border-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 18px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 14px;
            box-shadow: 0 -12px 36px rgba(0,0,0,0.6);
            z-index: 30;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        .emoji-picker.active { transform: translateY(0); }
        .emoji-picker span { font-size: 1.6rem; cursor: pointer; text-align: center; user-select: none; transition: transform 0.1s; }
        .emoji-picker span:active { transform: scale(1.3); }
    </style>
</head>
<body>

    <div class="chat-container" id="appContainer">
        <header class="chat-header">
            <div class="avatar" id="roomAvatar">🛡️</div>
            <div class="user-info">
                <h2 id="roomTitle">Sala Ultra Blindada</h2>
                <span id="status">Seguro e Ativo</span>
            </div>
            <button class="btn-header-action" id="fullscreenBtn" title="Tela Cheia">⛶</button>
        </header>

        <nav class="tab-bar">
            <button class="tab-btn" id="tabLoginBtn">Perfil / Login</button>
            <button class="tab-btn active" id="tabChatBtn">Chat Room</button>
        </nav>

        <!-- ABA DE LOGIN / CONFIGURAÇÃO -->
        <div class="tab-content" id="contentLogin">
            <div class="login-screen">
                <h3>Acessar Aplicativo</h3>
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">Aqui você pode configurar um e-mail para assinar suas mensagens ou trocar de usuário.</p>
                
                <div class="input-group">
                    <label>E-mail ou Nick</label>
                    <input type="email" id="loginEmail" placeholder="exemplo@email.com" autocomplete="email">
                </div>
                <div class="input-group" style="display:none;"> <!-- Senha Ocultada/Desativada conforme solicitado antes -->
                    <label>Senha</label>
                    <input type="password" id="loginPassword" value="123456" placeholder="Sua senha secreta">
                </div>
                
                <button class="btn-action" id="enterChatBtn">Salvar Identidade</button>
                <div class="login-status" id="loginStatus"></div>
            </div>
        </div>

        <!-- ABA DO CHAT (ABRE ATIVA POR PADRÃO) -->
        <div class="tab-content active" id="contentChat">
            <main class="chat-messages" id="chatMessages"></main>

            <!-- Seletor de Emojis -->
            <div class="emoji-picker" id="emojiPicker">
                <span>😀</span><span>😃</span><span>😄</span><span>😁</span><span>😆</span><span>😅</span><span>😂</span>
                <span>😊</span><span>😍</span><span>🥰</span><span>😘</span><span>😜</span><span>😎</span><span>🤔</span>
                <span>👍</span><span>🔥</span><span>❤️</span><span>👏</span><span>🎉</span><span>🚀</span><span>✨</span>
            </div>

            <footer class="chat-input-area">
                <button class="btn-header-action" id="btnEmoji" style="font-size: 1.15rem; flex-shrink: 0;">😊</button>
                <button class="btn-header-action" id="btnFile" style="font-size: 1.15rem; flex-shrink: 0;">📷</button>
                <button class="btn-header-action" id="btnWallpaper" style="font-size: 1.15rem; flex-shrink: 0;">🖼️</button>
                
                <input type="file" id="fileInput" accept="image/*" style="display: none;">

                <div class="input-wrapper">
                    <textarea id="messageInput" class="chat-input" placeholder="Mensagem..." rows="1" autocomplete="off"></textarea>
                    
                    <div class="recording-container" id="recordingContainer">
                        <div class="record-dot"></div>
                        <span id="recordTimer">Gravando 00:00</span>
                    </div>
                </div>
                
                <button id="sendBtn" class="btn-send">🎤</button>
            </footer>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3qtVwG2HfFUzQw-l0VnqQ3r_dx_HwTPo",
            authDomain: "chat-mobile-d4dea.firebaseapp.com",
            projectId: "chat-mobile-d4dea",
            storageBucket: "chat-mobile-d4dea.firebasestorage.app",
            messagingSenderId: "492131615338",
            appId: "1:492131615338:web:11162bcbcffd8016b84013"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesCollection = collection(db, "messages");

        // Elementos principais
        const tabLoginBtn = document.getElementById('tabLoginBtn');
        const tabChatBtn = document.getElementById('tabChatBtn');
        const contentLogin = document.getElementById('contentLogin');
        const contentChat = document.getElementById('contentChat');
        const loginEmail = document.getElementById('loginEmail');
        const enterChatBtn = document.getElementById('enterChatBtn');
        const loginStatus = document.getElementById('loginStatus');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Recursos extras de Media
        const btnEmoji = document.getElementById('btnEmoji');
        const emojiPicker = document.getElementById('emojiPicker');
        const btnFile = document.getElementById('btnFile');
        const fileInput = document.getElementById('fileInput');
        const btnWallpaper = document.getElementById('btnWallpaper');
        const recordingContainer = document.getElementById('recordingContainer');
        const recordTimer = document.getElementById('recordTimer');

        let isRecording = false;
        let recordInterval;
        let recordSeconds = 0;

        const wallpapers = [
            'radial-gradient(circle at top, #131b2e, #070a12)',
            'linear-gradient(135deg, #0284c7 0%, #0f172a 100%)',
            'linear-gradient(135deg, #111827 0%, #111827 100%)',
            'radial-gradient(circle at center, #1e1b4b, #090d16)'
        ];
        let currentWallpaperIdx = 0;

        // 🌟 MELHORIA: Login inteligente e imperceptível por trás das regras do banco
        function getOrInitializeUser() {
            let userEmail = localStorage.getItem('chat_user_email');
            
            if (!userEmail) {
                // Se não houver e-mail configurado, gera um lindo anônimo automaticamente
                const randId = Math.floor(1000 + Math.random() * 9000);
                userEmail = `Anonimo_${randId}@blindado.com`;
                localStorage.setItem('chat_user_email', userEmail);
            }
            
            loginEmail.value = userEmail;
            loginStatus.textContent = "Conectado como: " + userEmail;
            return userEmail;
        }

        // Inicializa o usuário direto ao abrir o site
        getOrInitializeUser();

        // Alternância de Abas
        function switchTab(target) {
            if (target === 'login') {
                tabLoginBtn.classList.add('active');
                tabChatBtn.classList.remove('active');
                contentLogin.classList.add('active');
                contentChat.classList.remove('active');
            } else if (target === 'chat') {
                tabLoginBtn.classList.remove('active');
                tabChatBtn.classList.add('active');
                contentLogin.classList.remove('active');
                contentChat.classList.add('active');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        tabLoginBtn.addEventListener('click', () => switchTab('login'));
        tabChatBtn.addEventListener('click', () => switchTab('chat'));

        // Salvar Login Manual (se o usuário quiser trocar)
        enterChatBtn.addEventListener('click', () => {
            const email = loginEmail.value.trim();
            if (!email || !email.includes('@')) {
                alert("Insira um formato válido de identificador (com @).");
                return;
            }
            if (email.length < 5 || email.length > 50) {
                alert("O identificador precisa ter entre 5 e 50 caracteres para manter as regras do banco de dados.");
                return;
            }
            localStorage.setItem('chat_user_email', email);
            loginStatus.textContent = "Identidade salva: " + email;
            switchTab('chat');
        });

        // Alternador de Fundo
        btnWallpaper.addEventListener('click', () => {
            currentWallpaperIdx = (currentWallpaperIdx + 1) % wallpapers.length;
            chatMessages.style.background = wallpapers[currentWallpaperIdx];
        });

        // Emojis e Teclados
        btnEmoji.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.classList.toggle('active');
        });

        emojiPicker.querySelectorAll('span').forEach(emoji => {
            emoji.addEventListener('click', () => {
                messageInput.value += emoji.innerText;
                toggleSendButton();
                messageInput.focus();
            });
        });

        document.addEventListener('click', () => emojiPicker.classList.remove('active'));
        emojiPicker.addEventListener('click', (e) => e.stopPropagation());

        // Controle do Botão Enviar / Microfone
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
            toggleSendButton();
        });

        function toggleSendButton() {
            if (messageInput.value.trim().length > 0) {
                sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>';
            } else {
                sendBtn.innerHTML = '🎤';
            }
        }

        // Lógica de Envio Geral (Mensagem ou Gravação)
        async function handleAction() {
            const currentEmail = localStorage.getItem('chat_user_email');
            const text = messageInput.value.trim();

            if (text === '') {
                if (!isRecording) {
                    startRecording();
                } else {
                    await stopAndSendRecording();
                }
                return;
            }

            if (text.length > 1000) return;
            messageInput.value = '';
            messageInput.style.height = 'auto';
            toggleSendButton();

            try {
                await addDoc(messagesCollection, {
                    content: text,
                    senderId: currentEmail,
                    isImage: false,
                    isAudio: false,
                    timestamp: serverTimestamp()
                });
            } catch (error) {
                alert("Erro ao postar mensagem. Reinicie.");
            }
        }

        // Gravação Simulado de Áudio
        function startRecording() {
            isRecording = true;
            messageInput.style.display = 'none';
            recordingContainer.style.display = 'flex';
            sendBtn.innerHTML = '⏹';
            sendBtn.style.background = '#ef4444';
            
            recordSeconds = 0;
            recordInterval = setInterval(() => {
                recordSeconds++;
                const mins = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
                const secs = String(recordSeconds % 60).padStart(2, '0');
                recordTimer.innerText = `Gravando ${mins}:${secs}`;
            }, 1000);
        }

        async function stopAndSendRecording() {
            isRecording = false;
            clearInterval(recordInterval);
            messageInput.style.display = 'block';
            recordingContainer.style.display = 'none';
            sendBtn.style.background = 'var(--primary)';
            toggleSendButton();

            const mins = String(Math.floor(recordSeconds / 60)).padStart(2, '0');
            const secs = String(recordSeconds % 60).padStart(2, '0');
            const durationStr = `${mins}:${secs}`;
            const currentEmail = localStorage.getItem('chat_user_email');

            try {
                await addDoc(messagesCollection, {
                    content: durationStr,
                    senderId: currentEmail,
                    isImage: false,
                    isAudio: true,
                    timestamp: serverTimestamp()
                });
            } catch (error) {
                console.error("Falha ao salvar gravação:", error);
            }
        }

        // Envio de Imagem Otimizada (Comprimida antes do upload para evitar erros de limite)
        btnFile.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const currentEmail = localStorage.getItem('chat_user_email');
            const reader = new FileReader();

            reader.onload = function (event) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 450; 
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const base64Data = canvas.toDataURL('image/jpeg', 0.55); // Redução dinâmica de peso

                    try {
                        await addDoc(messagesCollection, {
                            content: base64Data,
                            senderId: currentEmail,
                            isImage: true,
                            isAudio: false,
                            timestamp: serverTimestamp()
                        });
                    } catch (error) {
                        alert("Ocorreu um erro ao carregar essa foto no servidor.");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        });

        // Renderização em tempo real (Firestore DB Real-Time)
        const q = query(messagesCollection, orderBy("timestamp", "asc"));

        onSnapshot(q, (snapshot) => {
            chatMessages.innerHTML = '';
            const currentEmail = localStorage.getItem('chat_user_email') || '';
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                if(!data.timestamp) return; 

                const messageDiv = document.createElement('div');
                const isMyMessage = data.senderId === currentEmail;
                messageDiv.classList.add('message', isMyMessage ? 'sent' : 'received');

                const messageDate = data.timestamp.toDate();
                const timeStr = messageDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const senderName = data.senderId.split('@')[0];
                const senderTag = !isMyMessage ? `<span class="message-sender">${senderName}</span>` : '';

                if (data.isImage) {
                    messageDiv.innerHTML = `${senderTag}<img src="${data.content}" alt="Imagem"><span class="message-time">${timeStr}</span>`;
                } else if (data.isAudio) {
                    // Render do player com waveform inteligente e fluida
                    messageDiv.innerHTML = `
                        ${senderTag}
                        <div class="audio-player-bubble">
                            <button class="audio-play-btn">▶</button>
                            <div class="audio-waveform">
                                ${Array(16).fill().map(() => `<div class="wave-bar" style="transform: scaleY(${0.3 + Math.random() * 0.7})"></div>`).join('')}
                            </div>
                            <span style="font-size: 0.75rem; color: #fff; opacity: 0.9; white-space: nowrap; font-weight:600;">${data.content}</span>
                        </div>
                        <span class="message-time">${timeStr}</span>
                    `;

                    const playBtn = messageDiv.querySelector('.audio-play-btn');
                    const waveBars = messageDiv.querySelectorAll('.wave-bar');
                    
                    playBtn.addEventListener('click', () => {
                        if (playBtn.innerHTML === '▶') {
                            playBtn.innerHTML = '⏸';
                            waveBars.forEach(bar => {
                                bar.classList.add('animating');
                                bar.style.animationDelay = `${Math.random() * 0.4}s`;
                            });
                        } else {
                            playBtn.innerHTML = '▶';
                            waveBars.forEach(bar => bar.classList.remove('animating'));
                        }
                    });

                } else {
                    messageDiv.innerHTML = `${senderTag}${data.content} <span class="message-time">${timeStr}</span>`;
                }

                chatMessages.appendChild(messageDiv);
            });

            // Rolagem inteligente automática para baixo ao receber mensagens
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        // Configuração final de triggers
        sendBtn.addEventListener('click', handleAction);
        messageInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleAction();
            }
        });

        // Tela Cheia Integrada
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
