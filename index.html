<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chat Premium Real-Time Completo & Privado</title>
    <style>
        :root {
            --bg-gradient-1: linear-gradient(135deg, #121214 0%, #1a1a1e 100%);
            --bg-gradient-2: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --bg-gradient-3: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --bg-gradient-4: linear-gradient(135deg, #000000 0%, #434343 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0b0d;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: var(--bg-gradient-1);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.5s ease;
            position: relative;
        }

        /* Tela de Autenticação */
        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121214;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .auth-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .auth-box h2 {
            color: #fff;
            font-size: 20px;
            text-align: center;
            margin-bottom: 4px;
        }

        .auth-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        .auth-btn {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-btn:hover { opacity: 0.9; }

        .auth-btn-demo {
            background: #007bff;
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-toggle-text {
            color: #b0b0b5;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
            margin-top: 4px;
            text-decoration: underline;
        }

        /* Cabeçalho do Perfil */
        .chat-header {
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-img-wrapper {
            position: relative;
            cursor: pointer;
        }

        .profile-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #007bff;
        }

        #file-avatar { display: none; }

        .profile-detail h4 {
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .profile-subtitle {
            font-size: 11px;
            color: #00ff88;
            display: block;
            max-width: 130px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
            margin-left: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .contacts-btn {
            background: rgba(0, 123, 255, 0.25);
            border: 1px solid rgba(0, 123, 255, 0.5);
            color: #66b2ff;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .notif-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #ffc107;
            padding: 6px 8px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
        }

        .wallpaper-select {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: none;
            padding: 6px 8px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            outline: none;
        }
        .wallpaper-select option { background: #1a1a1e; }

        /* Modal de Lista de Contatos */
        .contacts-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.96);
            z-index: 50;
            flex-direction: column;
            padding: 20px;
            gap: 12px;
        }

        .contacts-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }

        .search-box {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .contact-item:hover {
            background: rgba(0, 123, 255, 0.25);
        }

        .contact-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
        }

        .contact-info h5 {
            color: #fff;
            font-size: 14px;
        }

        .contact-info p {
            color: #b0b0b5;
            font-size: 11px;
        }

        /* Feed de Mensagens */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            color: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .message.left {
            background-color: #007bff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.right {
            background-color: #000000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .msg-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            align-self: flex-end;
            margin-top: 4px;
            display: block;
        }

        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .message:hover .delete-btn { display: flex; }

        .message img, .message video {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
            display: block;
        }

        .message .file-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00ff88;
            text-decoration: none;
            font-weight: 600;
            margin-top: 4px;
        }

        .file-caption {
            margin-top: 6px;
            font-size: 13.5px;
            color: #eeeeee;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 4px;
        }

        .encrypted-badge {
            display: block;
            font-size: 11px;
            color: #ffc107;
            margin-bottom: 4px;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Inputs */
        .chat-input-area {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tools-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            padding-left: 4px;
        }

        .tool-btn {
            background: none;
            border: none;
            color: #b0b0b5;
            font-size: 18px;
            cursor: pointer;
        }

        .encrypt-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #b0b0b5;
            font-size: 12px;
            cursor: pointer;
            margin-left: auto;
        }

        .input-row { display: flex; gap: 8px; align-items: center; }

        #msg-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            border-radius: 16px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        #send-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 18px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: #1a1a1e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            z-index: 20;
            max-height: 220px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .emoji-picker span { font-size: 20px; cursor: pointer; text-align: center; padding: 4px; border-radius: 6px; }

        .file-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.95);
            z-index: 40;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .file-modal-box {
            background: #1a1a1e;
            width: 100%;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .preview-container {
            width: 100%; max-height: 180px; overflow: hidden; border-radius: 10px;
            display: flex; justify-content: center; align-items: center; background: #000;
        }
        .preview-container img, .preview-container video { max-width: 100%; max-height: 180px; object-fit: contain; }
        #file-caption-input {
            width: 100%; background: #25252b; border: 1px solid #3a3a42;
            padding: 12px; color: white; border-radius: 10px; outline: none;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chat-box">
        
        <!-- TELA DE AUTENTICAÇÃO -->
        <div class="auth-overlay" id="auth-overlay">
            <div class="auth-box">

                <button id="auth-primary-btn" class="auth-btn">Entrar</button>
                <button id="auth-demo-btn" class="auth-btn-demo">⚡ Entrar Direto (Modo Local/Teste)</button>
                <p id="auth-toggle-link" class="auth-toggle-text">Não tem uma conta? Cadastre-se</p>
            </div>
        </div>

        <!-- MODAL DE CONTATOS -->
        <div class="contacts-modal" id="contacts-modal">
            <div class="contacts-modal-header">
                <h3>Conversas Privadas</h3>
                <button id="close-contacts-btn" style="background:none; border:none; color:#ff4d4d; font-size:16px; cursor:pointer; font-weight:bold;">Fechar ✕</button>
            </div>

            <div class="search-box">
                <input type="email" id="search-email-input" class="auth-input" placeholder="Digite o e-mail do seu contato..." style="padding: 8px 12px;">
                <button id="search-email-btn" class="auth-btn" style="padding: 8px 14px; white-space: nowrap;">Buscar</button>
            </div>

            <div class="contacts-list" id="contacts-list"></div>
        </div>

        <!-- Cabeçalho -->
        <div class="chat-header">
            <div class="profile-info">
                <div class="profile-img-wrapper" id="avatar-click-zone">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop" alt="Avatar" class="profile-img" id="avatar-preview">
                    <input type="file" id="file-avatar" accept="image/*">
                </div>
                <div class="profile-detail">
                    <h4 id="profile-name">Usuário</h4>

            <div class="header-actions">
                <button class="contacts-btn" id="open-contacts-btn" title="Escolher com quem conversar">👥 Contatos</button>
                <button class="notif-btn" id="enable-notif-btn" title="Ativar Notificações">🔔</button>
                <select class="wallpaper-select" id="wallpaper-selector">
                    <option value="1">Noir Elegance</option>
                    <option value="2">Deep Ocean</option>
                    <option value="3">Midnight Blue</option>
                    <option value="4">Dark Carbon</option>
                </select>
            </div>
        </div>

        <!-- Mensagens -->
        <div class="chat-messages" id="chat-messages"></div>

        <!-- Emojis -->
        <div class="emoji-picker" id="emoji-picker"></div>

        <!-- Modal Arquivo -->
        <div class="file-modal" id="file-modal">
            <div class="file-modal-box">
                <h3 id="upload-status-title">Enviar Arquivo / Foto</h3>
                <div class="preview-container" id="file-preview-zone"></div>
                <input type="text" id="file-caption-input" placeholder="Escreva uma legenda...">
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button id="cancel-file-btn" style="background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: 600; padding: 10px;">Cancelar</button>
                    <button id="confirm-file-btn" style="background: #fff; border: none; color: #000; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer;">Enviar</button>
                </div>
            </div>
        </div>

        <!-- Inputs -->
        <div class="chat-input-area">
            <div class="tools-bar">
                <button class="tool-btn" id="emoji-toggle-btn">😀</button>
                <button class="tool-btn" id="attach-btn">📎</button>
                <input type="file" id="file-input" accept="image/*,video/*,application/*" style="display: none;">

                <label class="encrypt-toggle">
                    <input type="checkbox" id="encrypt-check"> 🔑 Criptografar
                </label>
            </div>

            <div class="input-row">
                <input type="text" id="msg-input" placeholder="Selecione um contato em '👥 Contatos'..." onkeypress="checkEnter(event)">
                <button id="send-btn">Enviar</button>
            </div>

    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, setDoc, getDocs, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQ3ebWx62hta35KRdihRbtwJoxrlUtxiM",
            authDomain: "chat-e797a.firebaseapp.com",
            projectId: "chat-e797a",
            storageBucket: "chat-e797a.firebasestorage.app",
            messagingSenderId: "104946241159",
            appId: "1:104946241159:web:93acbec71b40ec46c87222"
        };

        let app, auth, db, storage;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            storage = getStorage(app);
        } catch(e) {
            console.warn("Firebase offline ou com erro de inicialização:", e);
        }

        let usuarioAtual = null;
        let contatoAtivo = null; 
        let chatIdAtual = null;  
        let isScreenLoginMode = true;
        let mensagensLocais = [];

        const authOverlay = document.getElementById('auth-overlay');
        const authTitle = document.getElementById('auth-title');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authPrimaryBtn = document.getElementById('auth-primary-btn');
        const authDemoBtn = document.getElementById('auth-demo-btn');
        const authToggleLink = document.getElementById('auth-toggle-link');
        
        const contactsModal = document.getElementById('contacts-modal');
        const contactsList = document.getElementById('contacts-list');
        const openContactsBtn = document.getElementById('open-contacts-btn');
        const closeContactsBtn = document.getElementById('close-contacts-btn');
        const searchEmailInput = document.getElementById('search-email-input');
        const searchEmailBtn = document.getElementById('search-email-btn');
        const activeChatSubtitle = document.getElementById('active-chat-subtitle');

        const chatMessages = document.getElementById('chat-messages');
        const msgInput = document.getElementById('msg-input');
        const encryptCheck = document.getElementById('encrypt-check');
        const emojiPicker = document.getElementById('emoji-picker');
        const fileInput = document.getElementById('file-input');
        const fileModal = document.getElementById('file-modal');
        const filePreviewZone = document.getElementById('file-preview-zone');
        const fileCaptionInput = document.getElementById('file-caption-input');

        let rawSelectedFile = null;
        let unsubscribeSnapshot = null;

        // Entrar Direto (Modo Teste/Local - Garantia que o app abre 100%)
        authDemoBtn.onclick = () => {
            const emailDigitado = authEmail.value.trim() || "usuario@teste.com";
            usuarioAtual = {
                uid: "uid_" + btoa(emailDigitado).replace(/=/g, '').slice(0, 10),
                email: emailDigitado
            };
            entrarNoApp(usuarioAtual);
        };

        function entrarNoApp(user) {
            authOverlay.style.display = 'none';
            document.getElementById('profile-name').innerText = user.email.split('@')[0];
            const avatarSalvo = localStorage.getItem('profile_avatar_' + user.uid);
            if(avatarSalvo) document.getElementById('avatar-preview').src = avatarSalvo;
        }

        // Criptografia por senha
        function criptografarTextoComSenha(texto, senha) {
            let resultado = '';
            for (let i = 0; i < texto.length; i++) {
                resultado += String.fromCharCode(texto.charCodeAt(i) ^ senha.charCodeAt(i % senha.length));
            }
            return JSON.stringify({
                data: btoa(unescape(encodeURIComponent(resultado))),
                passHash: btoa(senha)
            });
        }

        function decriptografarTextoComSenha(payloadStr, senhaDigitada) {
            try {
                const obj = JSON.parse(payloadStr);
                if (obj.passHash !== btoa(senhaDigitada)) return null;
                const raw = decodeURIComponent(escape(atob(obj.data)));
                let resultado = '';
                for (let i = 0; i < raw.length; i++) {
                    resultado += String.fromCharCode(raw.charCodeAt(i) ^ senhaDigitada.charCodeAt(i % senhaDigitada.length));
                }
                return resultado;
            } catch (e) {
                return null;
            }
        }

        function obterHoraFormatada(createdAt) {
            if (!createdAt) return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const data = createdAt.toDate ? createdAt.toDate() : new Date(createdAt);
            return data.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        openContactsBtn.onclick = () => {
            contactsModal.style.display = 'flex';
            carregarListaGeralContatos();
        };

        async function carregarListaGeralContatos() {
            contactsList.innerHTML = '';
            let lista = [
                { uid: "user_maria", email: "maria@chat.com", name: "Maria Silva" },
                { uid: "user_joao", email: "joao@chat.com", name: "João Pedro" }
            ];

            if (db) {
                try {
                    const snap = await getDocs(collection(db, "usuarios"));
                    snap.forEach(docSnap => {
                        const u = docSnap.data();
                        if (usuarioAtual && u.uid !== usuarioAtual.uid) {
                            if(!lista.some(x => x.email === u.email)) lista.push(u);
                        }
                    });
                } catch(e) { console.log("Aviso ao buscar contatos:", e); }
            }

            lista.forEach(u => {
                if(usuarioAtual && u.email === usuarioAtual.email) return;
                const item = document.createElement('div');
                item.className = 'contact-item';
                item.innerHTML = `
                    <img src="${u.avatar || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop'}" class="contact-avatar">
                    <div class="contact-info">
                        <h5>${u.name || u.email}</h5>
                        <p>🔒 Conversa Privada • ${u.email}</p>
                    </div>
                `;
                item.onclick = () => selecionarContatoParaConversa(u);
                contactsList.appendChild(item);
            });
        }

        searchEmailBtn.onclick = () => {
            const emailBusca = searchEmailInput.value.trim().toLowerCase();
            if (!emailBusca) return alert("Digite um e-mail.");
            if (usuarioAtual && emailBusca === usuarioAtual.email.toLowerCase()) return alert("Você não pode abrir conversa com você mesmo.");

            const contato = {
                uid: "user_" + btoa(emailBusca).replace(/=/g, '').slice(0, 12),
                email: emailBusca,
                name: emailBusca.split('@')[0],
                avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop'
            };
            selecionarContatoParaConversa(contato);
            searchEmailInput.value = '';
        };

        closeContactsBtn.onclick = () => contactsModal.style.display = 'none';

        function selecionarContatoParaConversa(contato) {
            contatoAtivo = contato;
            contactsModal.style.display = 'none';
            
            const ids = [usuarioAtual.uid, contato.uid].sort();
            chatIdAtual = `${ids[0]}_${ids[1]}`;

            activeChatSubtitle.innerText = `Privado: ${contato.name || contato.email}`;
            msgInput.placeholder = `Mensagem para ${contato.name || contato.email}...`;

            iniciarEscutaMensagensPrivadas();
        }

        // Auth
        authToggleLink.onclick = () => {
            isScreenLoginMode = !isScreenLoginMode;
            authTitle.innerText = isScreenLoginMode ? "Acessar o Chat" : "Criar Nova Conta";
            authPrimaryBtn.innerText = isScreenLoginMode ? "Entrar" : "Cadastrar";
            authToggleLink.innerText = isScreenLoginMode ? "Não tem uma conta? Cadastre-se" : "Já possui uma conta? Entre aqui";
        };

        authPrimaryBtn.onclick = () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;

            if (!email || !password) return alert("Preencha e-mail e senha!");

            if (auth) {
                if (isScreenLoginMode) {
                    signInWithEmailAndPassword(auth, email, password)
                        .then(() => {})
                        .catch(error => alert("Erro no Login: " + error.message + "\n\n💡 Dica: Clique no botão azul 'Entrar Direto' para acessar imediatamente!"));
                } else {
                    createUserWithEmailAndPassword(auth, email, password)
                        .then(() => { alert("Conta criada! Faça login."); authToggleLink.click(); })
                        .catch(error => alert("Erro ao Cadastrar: " + error.message));
                }
            } else {
                authDemoBtn.click();
            }
        };

        document.getElementById('logout-btn').onclick = () => {
            if(auth) signOut(auth);
            usuarioAtual = null;
            contatoAtivo = null;
            chatIdAtual = null;
            chatMessages.innerHTML = '';
            authOverlay.style.display = 'flex';
        };

        if(auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    usuarioAtual = user;
                    entrarNoApp(user);
                }
            });
        }

        // Emojis
        const emojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😋','😛','😜','🤪','🤓','😎','🥳','😏','😒','😞','😔','😟','😕','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤯','😳','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','🥱','😴','🤤','😵','🤐','😷','🤒','🤑','🤠','😈','👹','🤡','💩','👻','💀','👽','👾','🤖','🎃','👋','✋','👌','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','👇','👍','👎','👊','👏','🙌','🤝','🙏','❤️','🧡','💛','💚','💙','💜','🖤','🤍','💔','❣️','💕','💞','💓','💗','💖','💘','💝','⚽','🏀','🚗','🚕','✈️','🚀','🇧🇷','🇺🇸'];

        emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.innerText = emoji;
            span.onclick = () => { msgInput.value += emoji; msgInput.focus(); };
            emojiPicker.appendChild(span);
        });

        document.getElementById('emoji-toggle-btn').onclick = () => emojiPicker.style.display = emojiPicker.style.display === 'grid' ? 'none' : 'grid';
        document.getElementById('attach-btn').onclick = () => fileInput.click();
        document.getElementById('cancel-file-btn').onclick = () => { fileModal.style.display = 'none'; fileInput.value = ''; rawSelectedFile = null; };
        document.getElementById('wallpaper-selector').onchange = (e) => document.getElementById('chat-box').style.background = `var(--bg-gradient-${e.target.value})`;
        document.getElementById('avatar-click-zone').onclick = () => document.getElementById('file-avatar').click();
        
        document.getElementById('file-avatar').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                const r = new FileReader();
                r.onload = (ev) => {
                    document.getElementById('avatar-preview').src = ev.target.result;
                    if(usuarioAtual) localStorage.setItem('profile_avatar_' + usuarioAtual.uid, ev.target.result);
                };
                r.readAsDataURL(f);
            }
        };

        window.checkEnter = function(e) { if(e.key === 'Enter') enviarMensagemTexto(); };
        document.getElementById('send-btn').onclick = enviarMensagemTexto;

        fileInput.onchange = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            rawSelectedFile = file;
            filePreviewZone.innerHTML = '';
            if (file.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                filePreviewZone.appendChild(img);
            } else {
                filePreviewZone.innerHTML = `<div style="color:#fff; padding:20px;">📁 ${file.name}</div>`;
            }
            fileModal.style.display = 'flex';
        };

        document.getElementById('confirm-file-btn').onclick = () => {
            if (!rawSelectedFile || !contatoAtivo) return alert("Selecione um contato primeiro!");
            const reader = new FileReader();
            reader.onload = (e) => {
                const dadosArquivo = JSON.stringify({
                    isRealFile: true,
                    fileUrl: e.target.result,
                    fileType: rawSelectedFile.type,
                    fileName: rawSelectedFile.name,
                    legenda: fileCaptionInput.value.trim()
                });
                salvarEEnviarMensagem(dadosArquivo);
                fileModal.style.display = 'none';
                rawSelectedFile = null;
            };
            reader.readAsDataURL(rawSelectedFile);
        };

        function enviarMensagemTexto() {
            const texto = msgInput.value.trim();
            if (!texto) return;
            if (!contatoAtivo) return alert("Clique em '👥 Contatos' e escolha com quem conversar!");
            
            let textoFinal = texto;
            if (encryptCheck.checked) {
                const senha = prompt("Crie uma senha de proteção:");
                if (!senha) return alert("Cancelado! Senha obrigatória para criptografar.");
                textoFinal = criptografarTextoComSenha(texto, senha);
            }

            salvarEEnviarMensagem(textoFinal, encryptCheck.checked);
            msgInput.value = '';
            encryptCheck.checked = false;
        }

        function salvarEEnviarMensagem(conteudo, isEncrypted = false) {
            const novaMsg = {
                autorId: usuarioAtual.uid,
                chatId: chatIdAtual,
                texto: conteudo,
                isEncrypted: isEncrypted,
                createdAt: new Date().toISOString()
            };

            if (db) {
                addDoc(collection(db, "mensagens"), { ...novaMsg, createdAt: serverTimestamp() }).catch(e => {
                    mensagensLocais.push(novaMsg);
                    renderizarMensagens();
                });
            } else {
                mensagensLocais.push(novaMsg);
                renderizarMensagens();
            }
        }

        function renderizarConteudo(texto, el) {
            if (texto.startsWith('{"isRealFile":true')) {
                try {
                    const arq = JSON.parse(texto);
                    if (arq.fileType.startsWith('image/')) el.innerHTML = `<img src="${arq.fileUrl}">`;
                    else el.innerHTML = `<a href="${arq.fileUrl}" download="${arq.fileName}" class="file-link">📁 ${arq.fileName}</a>`;
                    if (arq.legenda) el.innerHTML += `<div class="file-caption">${arq.legenda}</div>`;
                } catch(e) { el.innerText = texto; }
            } else {
                el.innerText = texto;
            }
        }

        function renderizarMensagens(docs = []) {
            chatMessages.innerHTML = '';
            const lista = docs.length ? docs : mensagensLocais.filter(m => m.chatId === chatIdAtual);

            lista.forEach(dados => {
                const msgDiv = document.createElement('div');
                const lado = (usuarioAtual && dados.autorId === usuarioAtual.uid) ? 'right' : 'left';
                msgDiv.classList.add('message', lado);

                const container = document.createElement('div');
                if (dados.isEncrypted) {
                    container.innerHTML = `<span class="encrypted-badge">🔒 Mensagem Protegida (Clique p/ ver)</span><span>••••••••</span>`;
                    msgDiv.onclick = () => {
                        const s = prompt("Digite a senha:");
                        if (s) {
                            const dec = decriptografarTextoComSenha(dados.texto, s);
                            if (dec !== null) {
                                container.innerHTML = '';
                                renderizarConteudo(dec, container);
                            } else alert("Senha incorreta!");
                        }
                    };
                } else {
                    renderizarConteudo(dados.texto, container);
                }

                msgDiv.appendChild(container);
                const hora = document.createElement('span');
                hora.className = 'msg-time';
                hora.innerText = obterHoraFormatada(dados.createdAt);
                msgDiv.appendChild(hora);

                chatMessages.appendChild(msgDiv);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function iniciarEscutaMensagensPrivadas() {
            if (unsubscribeSnapshot) unsubscribeSnapshot();
            if (!chatIdAtual) return;

            if (db) {
                try {
                    const q = query(collection(db, "mensagens"), where("chatId", "==", chatIdAtual));
                    unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                        const docs = [];
                        snapshot.forEach(d => docs.push({ id: d.id, ...d.data() }));
                        docs.sort((a,b) => new Date(a.createdAt?.toDate ? a.createdAt.toDate() : a.createdAt) - new Date(b.createdAt?.toDate ? b.createdAt.toDate() : b.createdAt));
                        renderizarMensagens(docs);
                    }, () => renderizarMensagens());
                } catch(e) { renderizarMensagens(); }
            } else {
                renderizarMensagens();
            }
        }
    </script>
</body>
</html>
