<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SaaS Tech Chat - Premium Minimalist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff87; /* Verde neon tech */
            --primary-muted: rgba(0, 255, 135, 0.15);
            --bg-black: #000000;
            --bg-card: #0a0a0c;
            --bg-card-hover: #121215;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-active: rgba(0, 255, 135, 0.3);
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --text-secondary: #c5c5c7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-black);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Container Principal */
        .app-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            max-width: 480px;
            background-color: var(--bg-black);
            display: flex;
            overflow: hidden;
            border-radius: 0;
            border: none;
        }

        @media (min-width: 481px) {
            .app-container {
                height: 92vh;
                border-radius: 20px;
                border: 1px solid var(--border-subtle);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            }
        }

        /* Container de Notificações Toast no Topo */
        .toast-container {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 999;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast-notification {
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-active);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            transform: translateY(-40px);
            opacity: 0;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast-notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ================= SIDEBAR (Lista de Conversas) ================= */
        .sidebar {
            flex: 100%;
            min-width: 100%;
            background-color: var(--bg-black);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .app-container.chat-open .sidebar {
            transform: translateX(-100%);
        }

        /* Cabeçalhos Modernos */
        .header {
            height: 70px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--border-subtle);
            z-index: 10;
        }

        .header-left-side {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        .header-title {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            color: var(--text-muted);
            font-size: 16px;
            align-items: center;
        }

        .header-icons i {
            cursor: pointer;
            transition: color 0.2s;
        }

        .header-icons i:hover {
            color: var(--primary);
        }

        .mobile-back-btn {
            font-size: 16px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            margin-right: 12px;
        }

        /* Campo de Pesquisa */
        .search-container {
            padding: 14px 20px;
            background-color: var(--bg-black);
        }

        .search-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-radius: 10px;
            gap: 10px;
            transition: border-color 0.2s;
        }

        .search-box:focus-within {
            border-color: var(--primary-muted);
        }

        .search-box input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 13.5px;
            color: var(--text-main);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* Lista de Chats */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .chat-item {
            display: flex;
            padding: 16px;
            margin-bottom: 6px;
            border-radius: 12px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chat-item:hover {
            background-color: var(--bg-card-hover);
        }

        .chat-item.active {
            background-color: var(--bg-card-hover);
            border-color: var(--border-active);
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-info-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        /* Formatação de E-mail de Alta Costura */
        .email-display {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-domain {
            color: var(--text-muted);
            font-size: 12.5px;
            font-weight: 400;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 8px;
            flex-shrink: 0;
        }

        .chat-msg-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.8;
            flex: 1;
        }

        /* Badge de mensagens não lidas */
        .unread-badge {
            background-color: var(--primary);
            color: #000000;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 10px;
            display: none; /* Ativado via JS */
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(0, 255, 135, 0.4);
        }

        /* ================= ÁREA DE CONVERSA (CHAT) ================= */
        .chat-area {
            flex: 100%;
            min-width: 100%;
            background-color: var(--bg-black);
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .app-container.chat-open .chat-area {
            right: 0;
        }

        /* Janela de Mensagens */
        .chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background-color: var(--bg-black);
            -webkit-overflow-scrolling: touch;
        }

        /* Estilização de fundo */
        .wp-classic { background: radial-gradient(circle at top, #0a0a0c, #000000); }
        .wp-dark { background: #000000; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 20px 20px; }
        .wp-sunset { background: linear-gradient(180deg, #12091a 0%, #000000 100%); }
        .wp-forest { background: linear-gradient(180deg, #05140f 0%, #000000 100%); }
        .wp-neon { background: radial-gradient(circle at center, #0a111a, #000000); }

        /* Mensagens */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message .time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 6px;
            align-self: flex-end;
        }

        .msg-received {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-sent {
            background: #ffffff;
            color: #000000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-sent .time {
            color: #666666;
        }

        /* Rodapé de Envio */
        .chat-footer {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            border-top: 1px solid var(--border-subtle);
            position: relative;
        }

        .footer-icons {
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            gap: 16px;
            padding-bottom: 12px;
        }

        .footer-icons i:hover {
            color: var(--primary);
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 4px 14px;
            display: flex;
            align-items: flex-end;
            min-height: 44px;
            max-height: 140px;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--border-active);
        }

        .chat-input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: white;
            resize: none;
            padding: 10px 0;
            line-height: 1.4;
        }
        .chat-input::placeholder { color: var(--text-muted); }

        .btn-send {
            background-color: white;
            color: black;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-send:active { transform: scale(0.95); }

        /* Painel de Emojis */
        .emoji-panel {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: #0d0d10;
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.95);
            z-index: 100;
            width: 250px;
            max-height: 220px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-subtle) transparent;
        }

        .emoji-panel.show { display: grid; }

        .emoji-panel::-webkit-scrollbar {
            width: 4px;
        }
        .emoji-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .emoji-panel::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 10px;
        }

        .emoji-item {
            font-size: 20px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }

        .emoji-item:hover { transform: scale(1.25); }
        .emoji-item:active { transform: scale(0.95); }

        .wallpaper-panel {
            position: absolute;
            top: 75px;
            right: 20px;
            background: #0d0d10;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 101;
            width: 150px;
        }

        .wallpaper-panel.show { display: flex; }

        .wp-option {
            padding: 8px 10px;
            font-size: 12.5px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            color: var(--text-main);
        }

        .wp-option:hover { background-color: var(--bg-card-hover); }

        .wp-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* Modal */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .identity-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active .identity-card {
            transform: scale(1);
        }

        .identity-card h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .identity-card p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            padding: 12px;
            background: var(--bg-black);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            outline: none;
            font-size: 13.5px;
            color: white;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .btn-action {
            background-color: white;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13.5px;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-action:active { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        
        <!-- CONTAINER PARA TOASTS DE NOTIFICAÇÃO -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- SIDEBAR (Lista de Conversas) -->
        <div class="sidebar">
            <div class="header">
                <div class="header-left-side" id="myProfileTrigger" title="Configurar Identidade">
                    <span class="header-title" id="myDisplayName">
                        usuario<span class="email-domain">@email.com</span>
                    </span>
                </div>
                <div class="header-icons">
                    <i class="fa-solid fa-square-plus" title="Nova Conversa"></i>
                    <i class="fa-solid fa-sliders" title="Configurações"></i>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted); font-size: 13px;"></i>
                    <input type="text" id="searchInput" placeholder="Filtrar por endereço de e-mail...">
                </div>
            </div>

            <!-- Lista de Conversas com estrutura para Badge de não-lidas -->
            <div class="chat-list" id="chatList">
                <div class="chat-item" data-id="1">
                    <div class="chat-info">
                        <div class="chat-info-top">
                            <span class="email-display">clara.mendes<span class="email-domain">@empresa.com</span></span>
                            <span class="chat-time">14:32</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px; gap: 8px;">
                            <div class="chat-msg-preview">Vamos fechar os detalhes do design amanhã?</div>
                            <span class="unread-badge" id="badge-1">0</span>
                        </div>
                    </div>
                </div>
                <div class="chat-item" data-id="2">
                    <div class="chat-info">
                        <div class="chat-info-top"
